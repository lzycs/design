<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研讨室详情 - 校园协作系统</title>
    <script src="https://at.alicdn.com/t/c/font_4068990_7yf5e9z09.js"></script> <!-- 复用原有图标库 -->
    <style>
        /* 复用基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #F5F7FA;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 0;
            margin: 0;
        }
        .mobile-container {
            width: 100%;
            height: 100vh;
            max-width: 420px;
            border: 1px solid #DCDFE6;
            border-radius: 0;
            background-color: #FFFFFF;
            box-shadow: none;
            overflow: hidden;
            position: relative;
        }
        .page {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            -ms-overflow-style: none;
            scrollbar-width: none;
            background-color: #F5F7FA;
            padding-bottom: 72px;
            display: none;
        }
        .page.active {
            display: block;
        }
        .page::-webkit-scrollbar {
            display: none;
        }
        .page-header {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background-color: #FFFFFF;
            border-bottom: 1px solid #F5F7FA;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .back-btn {
            margin-right: 16px;
            cursor: pointer;
        }
        .back-btn .icon {
            font-size: 20px;
            color: #1A1A1A;
        }
        .page-header-title {
            font-size: 18px;
            font-weight: 600;
            color: #1A1A1A;
            flex: 1;
            text-align: center;
        }
        .content-area {
            padding: 16px 20px;
        }
        .card {
            background-color: #FFFFFF;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            padding: 16px;
            margin-bottom: 12px;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #1A1A1A;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }
        .section-title .icon {
            font-size: 16px;
            color: #4A90E2;
            margin-right: 8px;
        }
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 56px;
            background-color: #FFFFFF;
            border-top: 1px solid #F5F7FA;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 99;
            max-width: 420px;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #909399;
            font-size: 12px;
        }
        .tab-item.active {
            color: #4A90E2;
        }
        .tab-item .icon {
            font-size: 24px;
            margin-bottom: 4px;
        }
        .action-btn {
            padding: 10px 0;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
        }
        .primary-btn {
            background-color: #4A90E2;
            color: #FFFFFF;
        }

        /* 研讨室详情专属样式 */
        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        .room-info {
            flex: 1;
        }
        .room-name {
            font-size: 20px;
            font-weight: 600;
            color: #1A1A1A;
            margin-bottom: 4px;
        }
        .room-location {
            font-size: 14px;
            color: #909399;
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .room-location .icon {
            font-size: 14px;
            margin-right: 4px;
        }
        .room-tag {
            display: inline-block;
            padding: 4px 8px;
            background-color: #E8F4FF;
            color: #4A90E2;
            border-radius: 16px;
            font-size: 12px;
            margin-right: 8px;
            margin-bottom: 8px;
        }
        .room-capacity {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: #666666;
            margin-bottom: 16px;
        }
        .room-capacity .icon {
            font-size: 14px;
            color: #4A90E2;
            margin-right: 8px;
        }
        .room-facility {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        .facility-item {
            display: flex;
            align-items: center;
            padding: 6px 12px;
            background-color: #F5F7FA;
            border-radius: 8px;
            font-size: 14px;
            color: #666666;
        }
        .facility-item .icon {
            font-size: 14px;
            color: #4A90E2;
            margin-right: 6px;
        }

        /* 预约信息样式 */
        .reservation-info {
            background-color: #F0F7FF;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
        }
        .reservation-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .reservation-item:last-child {
            margin-bottom: 0;
        }
        .reservation-label {
            font-size: 14px;
            color: #666666;
        }
        .reservation-value {
            font-size: 14px;
            color: #1A1A1A;
            font-weight: 500;
        }

        /* 协作文档样式 */
        .doc-card {
            border: 1px dashed #4A90E2;
            background-color: #F9FBFF;
            text-align: center;
            padding: 24px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .doc-card:hover {
            background-color: #F0F7FF;
        }
        .doc-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background-color: #4A90E2;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 16px;
        }
        .doc-icon .icon {
            font-size: 32px;
            color: #FFFFFF;
        }
        .doc-title {
            font-size: 18px;
            font-weight: 600;
            color: #1A1A1A;
            margin-bottom: 8px;
        }
        .doc-desc {
            font-size: 14px;
            color: #666666;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        .doc-meta {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            color: #909399;
            margin-bottom: 20px;
        }
        .doc-meta-item {
            display: flex;
            align-items: center;
            margin-right: 16px;
        }
        .doc-meta-item:last-child {
            margin-right: 0;
        }
        .doc-meta-item .icon {
            font-size: 12px;
            margin-right: 4px;
        }
        .doc-enter-btn {
            padding: 10px 24px;
            border-radius: 8px;
            background-color: #4A90E2;
            color: #FFFFFF;
            border: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }

        /* 协作文档编辑页样式 */
        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background-color: #FFFFFF;
            border-bottom: 1px solid #F5F7FA;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .editor-title {
            font-size: 16px;
            font-weight: 600;
            color: #1A1A1A;
        }
        .editor-tools {
            display: flex;
            gap: 16px;
        }
        .editor-tools .icon {
            font-size: 20px;
            color: #666666;
            cursor: pointer;
        }
        .editor-content {
            padding: 16px;
            min-height: calc(100% - 120px);
            background-color: #FFFFFF;
        }
        .editor-textarea {
            width: 100%;
            min-height: 300px;
            border: none;
            outline: none;
            font-size: 16px;
            color: #1A1A1A;
            line-height: 1.8;
            resize: none;
        }
        .editor-status {
            padding: 8px 16px;
            background-color: #F5F7FA;
            font-size: 12px;
            color: #909399;
            display: flex;
            align-items: center;
            border-top: 1px solid #E5E6EB;
        }
        .online-users {
            display: flex;
            align-items: center;
            margin-left: auto;
        }
        .user-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: #F0F7FF;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #4A90E2;
            font-size: 10px;
            font-weight: 600;
            margin-left: -4px;
            border: 2px solid #F5F7FA;
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <!-- 1. 研讨室详情页（含协作文档入口） -->
        <div class="page active" id="roomDetailPage">
            <div class="page-header">
                <div class="back-btn" id="backToPrev">
                    <i class="icon iconfont icon-arrow-left"></i>
                </div>
                <div class="page-header-title">研讨室详情</div>
                <div style="width: 24px;"></div>
            </div>
            
            <div class="content-area">
                <!-- 研讨室基础信息 -->
                <div class="card">
                    <div class="room-header">
                        <div class="room-info">
                            <div class="room-name">研讨室301</div>

                                <i class="icon iconfont icon-location"></i>
                                <span>3号教学楼3层西侧</span>
                            </div>
                            <div>
                                <span class="room-tag">可容纳15人</span>
                                <span class="room-tag">已预约</span>

                    </div>

                    <div class="section-title">

                    </div>
                    <div class="room-facility">
                        <div class="facility-item">

                        </div>
                        <div class="facility-item">

                    </div>
                </div>
                
                <!-- 在线协作文档入口（模拟Etherpad集成） -->
                <div class="section-title">

                </div>
                <div class="doc-card" id="docEntry">
                    <div class="doc-icon">

                    </div>

                            <i class="icon iconfont icon-user"></i>
                            <span>5人正在协作</span>
                        </div>
                        <div class="doc-meta-item">
                            <i class="icon iconfont icon-time"></i>
                            <span>最后编辑：10分钟前</span>
                        </div>
                    </div>
                    <button class="doc-enter-btn">进入协作编辑</button>
                </div>
                
                <!-- 操作按钮 -->
                <button class="action-btn primary-btn" id="enterChatBtn">进入小组聊天</button>
            </div>
            
            <!-- 底部Tab导航 -->
            <div class="tab-bar">
                <div class="tab-item">
                    <i class="icon iconfont icon-home"></i>
                    <span>首页</span>
                </div>
                <div class="tab-item">
                    <i class="icon iconfont icon-order"></i>
                    <span>预约</span>
                </div>
                <div class="tab-item active">
                    <i class="icon iconfont icon-team"></i>
                    <span>协作</span>
                </div>
                <div class="tab-item">
                    <i class="icon iconfont icon-building"></i>
                    <span>教室</span>
                </div>
                <div class="tab-item">
                    <i class="icon iconfont icon-my"></i>
                    <span>我的</span>
                </div>
            </div>
        </div>
        
        <!-- 2. 在线协作文档编辑页（模拟Etherpad功能） -->
        <div class="page" id="docEditorPage">
            <!-- 编辑页头部 -->
            <div class="editor-header">
                <div class="back-btn" id="backToRoomDetail">
                    <i class="icon iconfont icon-arrow-left"></i>
                </div>
                <div class="editor-title">Java项目需求文档协作版</div>
                <div class="editor-tools">
                    <i class="icon iconfont icon-save"></i>
                    <i class="icon iconfont icon-history"></i>
                    <i class="icon iconfont icon-share"></i>
                    <i class="icon iconfont icon-more"></i>

            </div>
            
            <!-- 编辑内容区域 -->
            <div class="editor-content">
                <textarea class="editor-textarea" placeholder="请输入文档内容...">
# Java项目需求文档（协作版）

## 1. 项目名称
校园二手交易平台

## 2. 项目目标
开发一个基于SpringBoot的校园二手交易平台，方便学生之间进行闲置物品交易，提高资源利用率。

## 3. 核心功能
### 3.1 用户模块
- 注册/登录（支持学号+密码登录）
- 个人信息管理（头像、昵称、联系方式）
- 我的发布、我的订单、我的收藏

### 3.2 商品模块
- 商品发布（标题、描述、价格、图片上传）
- 商品分类（书籍、电子产品、生活用品等）
- 商品搜索、筛选、排序

### 3.3 交易模块
- 下单功能
- 聊天沟通
- 交易状态跟踪
- 评价功能

## 4. 技术栈
- 后端：SpringBoot、MyBatis、MySQL
- 前端：Vue3、Element Plus、Axios
- 部署：Docker、Nginx

## 5. 开发计划
- 3月15日-3月20日：需求分析、数据库设计
- 3月21日-4月5日：核心功能开发
- 4月6日-4月10日：测试、Bug修复
- 4月11日：项目部署、验收
                </textarea>
            </div>
            
            <!-- 编辑状态栏 -->
            <div class="editor-status">
                <span>自动保存中...</span>
                <div class="online-users">
                    <div class="user-avatar" title="张三（组长）">张</div>
                    <div class="user-avatar" title="李四">李</div>
                    <div class="user-avatar" title="王五">王</div>
                    <div class="user-avatar" title="赵六">赵</div>
                    <div class="user-avatar" title="钱七">钱</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 页面切换函数
        function switchPage(fromPageId, toPageId) {
            document.getElementById(fromPageId).classList.remove('active');
            document.getElementById(toPageId).classList.add('active');
        }
        
        // 返回上一页
        document.getElementById('backToPrev').addEventListener('click', function() {
            window.history.back();
        });
        
        // 进入协作文档编辑页
        document.getElementById('docEntry').addEventListener('click', function() {
            switchPage('roomDetailPage', 'docEditorPage');
        });
        
        // 返回研讨室详情页
        document.getElementById('backToRoomDetail').addEventListener('click', function() {
            switchPage('docEditorPage', 'roomDetailPage');
        });
        
        // 进入小组聊天
        document.getElementById('enterChatBtn').addEventListener('click', function() {
            alert('跳转至小组聊天界面');
        });
        
        // 模拟协作文档自动保存
        const editorTextarea = document.querySelector('.editor-textarea');
        let saveTimer = null;
        
        editorTextarea.addEventListener('input', function() {
            // 输入时显示"正在保存..."
            document.querySelector('.editor-status span').textContent = '正在保存...';
            
            // 防抖处理，停止输入1秒后模拟保存成功
            clearTimeout(saveTimer);
            saveTimer = setTimeout(() => {
                document.querySelector('.editor-status span').textContent = '保存成功 ✓';
                setTimeout(() => {
                    document.querySelector('.editor-status span').textContent = '自动保存中...';
                }, 2000);
            }, 1000);
        });
        
        // 历史版本功能
        document.querySelector('.editor-tools .iconfont.icon-history').addEventListener('click', function() {
            alert('查看文档历史版本（模拟Etherpad版本控制功能）');
        });
        
        // 分享功能
        document.querySelector('.editor-tools .iconfont.icon-share').addEventListener('click', function() {
            alert('生成文档分享链接，可邀请成员加入协作');
        });
    </script>
