<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的评价</title>
    <script src="https://at.alicdn.com/t/c/font_4068990_7yf5e9z09.js"></script> <!-- 在线矢量图标库 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #F5F7FA;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        /* 手机边框容器 */
        .phone-container {
            width: 375px;
            height: 812px;
            border: 1px solid #DCDFE6;
            border-radius: 32px;
            background-color: #FFFFFF;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
        }
        /* 页面通用样式 */
        .common-page {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            -ms-overflow-style: none;
            scrollbar-width: none;
            background-color: #F5F7FA;
            padding-bottom: 72px;
        }
        .common-page::-webkit-scrollbar {
            display: none;
        }
        /* 页面标题栏 */
        .page-header {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background-color: #FFFFFF;
            border-bottom: 1px solid #F5F7FA;
        }
        .back-btn {
            margin-right: 16px;
        }
        .back-btn .icon {
            font-size: 20px;
            color: #1A1A1A;
        }
        .page-header-title {
            font-size: 18px;
            font-weight: 600;
            color: #1A1A1A;
            flex: 1;
            text-align: center;
        }
        /* 内容区域 */
        .content-area {
            padding: 16px 20px;
        }
        /* 评价卡片 */
        .evaluation-card {
            background-color: #FFFFFF;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            padding: 16px;
            margin-bottom: 12px;
        }
        .evaluation-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .evaluation-card-title {
            font-size: 16px;
            font-weight: 600;
            color: #1A1A1A;
        }
        .evaluation-time {
            font-size: 12px;
            color: #909399;
        }
        .evaluation-rating {
            display: flex;
            margin-bottom: 8px;
        }
        .star-icon {
            color: #F7D060;
            font-size: 16px;
            margin-right: 2px;
        }
        .star-icon.empty {
            color: #F5F7FA;
        }
        .evaluation-content {
            font-size: 14px;
            color: #333333;
            line-height: 1.5;
            margin-bottom: 12px;
        }
        .evaluation-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .evaluation-tag {
            padding: 4px 8px;
            border-radius: 16px;
            background-color: #F5F7FA;
            font-size: 12px;
            color: #666666;
        }
        /* 待评价提示 */
        .to-evaluate-card {
            background-color: #FFFFFF;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .to-evaluate-info {
            flex: 1;
        }
        .to-evaluate-title {
            font-size: 16px;
            font-weight: 600;
            color: #1A1A1A;
            margin-bottom: 4px;
        }
        .to-evaluate-desc {
            font-size: 12px;
            color: #909399;
        }
        .evaluate-btn {
            padding: 8px 16px;
            border-radius: 8px;
            background-color: #4A90E2;
            color: #FFFFFF;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        /* 无评价提示 */
        .empty-evaluation {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
            text-align: center;
        }
        .empty-icon {
            font-size: 64px;
            color: #E5E6EB;
            margin-bottom: 16px;
        }
        .empty-title {
            font-size: 18px;
            color: #1A1A1A;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .empty-desc {
            font-size: 14px;
            color: #909399;
            margin-bottom: 24px;
        }
        .empty-btn {
            padding: 10px 24px;
            border-radius: 8px;
            background-color: #4A90E2;
            color: #FFFFFF;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        /* 底部Tab导航 */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 375px;
            height: 56px;
            background-color: #FFFFFF;
            border-top: 1px solid #F5F7FA;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 99;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #909399;
            font-size: 12px;
        }
        .tab-item.active {
            color: #4A90E2;
        }
        .tab-item .icon {
            font-size: 24px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <!-- 我的评价页面 -->
        <div class="common-page">
            <!-- 标题栏 -->
            <div class="page-header">
                <a href="my.html" class="back-btn" style="text-decoration: none;">
                    <i class="icon iconfont icon-arrow-left"></i>
                </a>
                <div class="page-header-title">我的评价</div>
                <div style="width: 24px;"></div> <!-- 占位，使标题居中 -->
            </div>
            
            <!-- 内容区域 -->
            <div class="content-area">
                <!-- 待评价 -->
                <div class="to-evaluate-card">
                    <div class="to-evaluate-info">
                        <div class="to-evaluate-title">二号教学楼-202</div>
                        <div class="to-evaluate-desc">2026-03-04 08:00-10:00 | 普通教室</div>
                    </div>
                    <button class="evaluate-btn">去评价</button>
                </div>
                
                <!-- 已评价 -->
                <div class="evaluation-card">
                    <div class="evaluation-card-header">
                        <div class="evaluation-card-title">研讨室-02</div>
                        <div class="evaluation-time">2026-03-02</div>
                    </div>
                    <div class="evaluation-rating">
                        <i class="icon iconfont icon-star star-icon"></i>
                        <i class="icon iconfont icon-star star-icon"></i>
                        <i class="icon iconfont icon-star star-icon"></i>
                        <i class="icon iconfont icon-star star-icon"></i>
                        <i class="icon iconfont icon-star star-icon"></i>
                    </div>
                    <div class="evaluation-content">
                        研讨室环境很好，设备齐全，网络稳定，白板书写流畅，插座充足，非常适合小组讨论学习，推荐大家使用！
                    </div>
                    <div class="evaluation-tags">
                        <div class="evaluation-tag">环境整洁</div>
                        <div class="evaluation-tag">设备齐全</div>
                        <div class="evaluation-tag">网络稳定</div>
                    </div>
                </div>
                
                <div class="evaluation-card">
                    <div class="evaluation-card-header">
                        <div class="evaluation-card-title">图书馆-三层</div>
                        <div class="evaluation-time">2026-03-01</div>
                    </div>
                    <div class="evaluation-rating">
                        <i class="icon iconfont icon-star star-icon"></i>
                        <i class="icon iconfont icon-star star-icon"></i>
                        <i class="icon iconfont icon-star star-icon"></i>
                        <i class="icon iconfont icon-star star-icon"></i>
                        <i class="icon iconfont icon-star star-icon empty"></i>
                    </div>
                    <div class="evaluation-content">
                        自习环境很安静，光线充足，插座位置合理，唯一不足是部分座位的椅子有点旧，希望能尽快更换。
                    </div>
                    <div class="evaluation-tags">
                        <div class="evaluation-tag">安静</div>
                        <div class="evaluation-tag">光线好</div>
                        <div class="evaluation-tag">插座充足</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 底部Tab导航 -->
        <div class="tab-bar">
            <div class="tab-item">
                <i class="icon iconfont icon-home"></i>
                <span>首页</span>
            </div>
            <div class="tab-item">
                <i class="icon iconfont icon-order"></i>
                <span>预约</span>
            </div>
            <div class="tab-item active">
                <i class="icon iconfont icon-my"></i>
                <span>我的</span>
            </div>
        </div>
    </div>

    <script>
        // 评价按钮点击事件
        document.querySelector('.evaluate-btn').addEventListener('click', function() {
            alert('即将进入评价编辑页面');
            // 实际项目中可跳转至评价编辑页
        });
        
        // Tab切换效果
        document.querySelectorAll('.tab-item').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab-item').forEach(item => {
                    item.classList.remove('active');
                });
                this.classList.add('active');
                
                const tabText = this.querySelector('span').textContent;
                if (tabText === '首页') {
                    // window.location.href = 'index.html';
                    alert('即将跳转到首页');
                } else if (tabText === '预约') {
                    // window.location.href = 'booking.html';
                    alert('即将跳转到预约中心');
                }
            });
        });
    </script>
</body>
</html>
